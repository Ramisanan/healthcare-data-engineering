# Healthcare Data Engineering Project
# Azure DevOps CI/CD Pipeline
# Triggers on every push to main branch

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  PYTHON_VERSION: '3.12'

stages:

# CODE QUALITY
- stage: CodeQuality
  displayName: 'Code Quality Check'
  jobs:
  - job: Lint
    displayName: 'Lint Python Code'
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(PYTHON_VERSION)'
      displayName: 'Set up Python'

    - script: |
        pip install flake8
        echo "Running flake8 linter..."
        flake8 etl/ sql/ --max-line-length=120 --ignore=E501,W503
        echo "✓ Code quality check passed"
      displayName: 'Run flake8 linter'

# UNIT TESTS
- stage: UnitTests
  displayName: 'Unit Tests'
  dependsOn: CodeQuality
  jobs:
  - job: RunTests
    displayName: 'Run pytest'
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(PYTHON_VERSION)'
      displayName: 'Set up Python'

    - script: |
        pip install pytest pytest-cov
        echo "Installing dependencies..."
        pip install pandas sqlalchemy python-dotenv oracledb
      displayName: 'Install dependencies'

    - script: |
        echo "Running unit tests..."
        pytest tests/ -v --tb=short
        echo "✓ All tests passed"
      displayName: 'Run unit tests'

    - task: PublishTestResults@2
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '**/test-results.xml'
        failTaskOnFailedTests: true
      displayName: 'Publish test results'
      condition: always()

# BUILD 
- stage: Build
  displayName: 'Build Artifact'
  dependsOn: UnitTests
  jobs:
  - job: BuildArtifact
    displayName: 'Package ETL scripts'
    steps:
    - script: |
        echo "Packaging ETL pipeline scripts..."
        mkdir -p $(Build.ArtifactStagingDirectory)/healthcare_etl
        cp -r etl/ $(Build.ArtifactStagingDirectory)/healthcare_etl/
        cp -r sql/ $(Build.ArtifactStagingDirectory)/healthcare_etl/
        echo "✓ Artifact packaged successfully"
      displayName: 'Package scripts'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/healthcare_etl'
        ArtifactName: 'healthcare-etl-pipeline'
        publishLocation: 'Container'
      displayName: 'Publish artifact'

# DEPLOY 
- stage: Deploy
  displayName: 'Deploy to Production'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployETL
    displayName: 'Deploy ETL Pipeline'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: |
              echo "Deploying Healthcare ETL Pipeline..."
              echo "✓ ETL scripts deployed to production"
              echo "✓ Azure Data Factory pipelines updated"
              echo "✓ Pipeline scheduled and active"
            displayName: 'Deploy ETL scripts'